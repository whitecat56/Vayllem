<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#020617;
  color:white;
}

/* HEADER */
.header {
  padding:18px;
  font-size:22px;
  font-weight:700;
}

/* SEARCH */
.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#0f172a;
  color:white;
}

/* TABS */
.tabs {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}
.tab {
  padding:8px 14px;
  background:#0f172a;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:10px;
}

/* CARD */
.card {
  background:#0f172a;
  border-radius:16px;
  padding:10px;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.03);
}

/* IMAGE */
.img {
  width:100%;
  height:120px;
  border-radius:12px;
  object-fit:cover;
}

/* BUTTON */
.btn {
  margin-top:8px;
  padding:8px;
  border-radius:10px;
  border:none;
  width:100%;
}

.buy {
  background:#22c55e;
}

.fav {
  background:#1e293b;
  color:white;
}

/* FLOAT CART */
.cart {
  position:fixed;
  bottom:70px;
  right:15px;
  background:#22c55e;
  padding:12px;
  border-radius:50%;
  font-size:18px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#020617;
}

/* SKELETON */
.skeleton {
  background: linear-gradient(90deg,#0f172a,#1e293b,#0f172a);
  animation: loading 1.2s infinite;
  height:160px;
  border-radius:12px;
}

@keyframes loading {
  0%{background-position:-200px}
  100%{background-position:200px}
}
</style>
</head>

<body>

<div class="header">💊 Ulug'bek Farm</div>

<div class="search">
<input placeholder="🔎 Поиск..." oninput="search(this.value)">
</div>

<div class="tabs" id="tabs"></div>

<div id="products" class="grid"></div>

<div class="cart" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<div class="nav">
<div onclick="load()">🏠</div>
<div onclick="showFav()">❤️</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API = "http://127.0.0.1:8000";

let products = [];
let cart = [];
let fav = [];

/* LOAD */
async function load(){
  showSkeleton();

  const res = await fetch(API + "/products");
  products = await res.json();

  render(products);
  loadTabs();
}

/* SKELETON */
function showSkeleton(){
  let html="";
  for(let i=0;i<6;i++){
    html += `<div class="skeleton"></div>`;
  }
  document.getElementById("products").innerHTML = html;
}

/* TABS */
function loadTabs(){
  let cats = ["Все","Популярное","Антибиотики","Витамины"];

  let html="";
  cats.forEach(c=>{
    html += `<div class="tab" onclick="filterCat('${c}')">${c}</div>`;
  });

  document.getElementById("tabs").innerHTML = html;
}

function filterCat(c){
  if(c=="Все") return render(products);
  render(products.filter(p=>p.name.includes(c)));
}

/* RENDER */
function render(list){
  let html="";
  list.forEach(p=>{
    html += `
    <div class="card">
      <img class="img" src="https://picsum.photos/200?random=${p.id}">
      <b>${p.name}</b>
      <div>${p.price} сум</div>

      <button class="btn buy" onclick="addCart(${p.id})">
        🛒 Купить
      </button>

      <button class="btn fav" onclick="addFav(${p.id})">
        ❤️
      </button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

/* SEARCH */
function search(q){
  q=q.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

/* CART */
function addCart(id){
  cart.push(id);
  updateCart();
  tg.HapticFeedback.impactOccurred("light");
}

function updateCart(){
  document.getElementById("count").innerText = cart.length;
}

function openCart(){
  tg.sendData(JSON.stringify(cart));
}

/* FAV */
function addFav(id){
  fav.push(id);
  tg.showAlert("❤️ Добавлено");
}

function showFav(){
  render(products.filter(p=>fav.includes(p.id)));
}

load();
</script>

</body>
</html>
