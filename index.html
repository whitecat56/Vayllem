<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Ulug'bek Farm</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(15,23,42,0.6);
  --accent: #22c55e;
  --text: #e2e8f0;
}

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
}

/* HEADER */
.header {
  padding:20px;
  font-size:24px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
}

/* SEARCH */
.search {
  padding:10px 15px;
}

.search input {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:15px;
}

/* CARD */
.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius:18px;
  padding:12px;
  transition:0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

/* PRICE */
.price {
  color: var(--accent);
  font-weight:bold;
  margin-top:5px;
}

/* BUTTON */
.btn {
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:none;
  width:100%;
  font-weight:600;
  cursor:pointer;
}

.buy {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

.fav {
  background: rgba(255,255,255,0.05);
  color:white;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background: rgba(2,6,23,0.8);
  backdrop-filter: blur(20px);
}

.nav div {
  cursor:pointer;
}

/* ANIM */
.fade {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
💊 Ulug'bek Farm
</div>

<div class="search">
<input placeholder="🔎 Поиск..." oninput="search(this.value)">
</div>

<div id="products" class="grid fade"></div>

<div class="nav">
<div onclick="load()">🏠</div>
<div onclick="openCart()">🛒</div>
<div onclick="showFav()">❤️</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API = "http://127.0.0.1:8000";

let products = [];
let cart = [];
let fav = [];

/* LOAD */
async function load(){
  const res = await fetch(API + "/products");
  products = await res.json();
  render(products);
}

/* RENDER */
function render(list){
  let html = "";
  list.forEach(p=>{
    html += `
    <div class="card fade">
      <b>${p.name}</b>
      <div class="price">${p.price} сум</div>

      <button class="btn buy" onclick="addCart(${p.id})">
        🛒 Купить
      </button>

      <button class="btn fav" onclick="addFav(${p.id})">
        ❤️ В избранное
      </button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

/* SEARCH */
function search(q){
  q = q.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

/* CART */
function addCart(id){
  cart.push(id);
  tg.HapticFeedback.impactOccurred("medium");
}

function openCart(){
  tg.sendData(JSON.stringify({
    type:"cart",
    data:cart
  }));
}

/* FAVORITES */
function addFav(id){
  fav.push(id);
  tg.showAlert("Добавлено ❤️");
}

function showFav(){
  render(products.filter(p=>fav.includes(p.id)));
}

/* START */
load();
</script>

</body>
</html>
